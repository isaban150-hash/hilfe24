<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hilfe24 - Brief erklären</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      margin: 0;
      padding: 40px 20px;
    }

    .box {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      padding: 16px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: vertical;
      box-sizing: border-box;
      margin-top: 16px;
    }

    .uploadBox {
      margin-top: 16px;
      padding: 16px;
      border: 1px dashed #bbb;
      border-radius: 10px;
      background: #fafafa;
    }

    .uploadLabel {
      display: block;
      margin-bottom: 10px;
      font-size: 16px;
      color: #333;
      font-weight: bold;
    }

    input[type="file"] {
      font-size: 16px;
    }

    button {
      margin-top: 16px;
      background: #111827;
      color: white;
      border: none;
      padding: 14px 22px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #1f2937;
    }

    #status {
      margin-top: 16px;
      font-size: 18px;
    }

    #ergebnis {
      margin-top: 20px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 18px;
      white-space: pre-wrap;
      font-size: 18px;
      line-height: 1.6;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
    }

    .loading {
      color: #374151;
    }

    .small {
      margin-top: 8px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Brief erklären</h1>
    <p>Füge hier deinen Brief ein. Hilfe24 erklärt ihn dir einfach.</p>

    <textarea id="briefText" placeholder="Füge deinen Brief hier ein..."></textarea>

    <div class="uploadBox">
      <label class="uploadLabel" for="briefBild">Oder Foto vom Brief hochladen</label>
      <input type="file" id="briefBild" accept="image/*,.jpg,.jpeg,.png,.webp" multiple />
      <div class="small">Du kannst jetzt ein oder mehrere Bilder vom selben Brief hochladen. PDF bauen wir danach ein.</div>
    </div>

    <button id="erklaerBtn">📄 Brief erklären</button>

    <div id="status"></div>
    <div id="ergebnis"></div>
  </div>

        imageData,

</body>
</html>
