<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hilfe24</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .header {
      padding: 22px 18px 12px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border-bottom: 1px solid #e5e7eb;
    }

    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      color: #0f172a;
    }

    .subtitle {
      margin: 8px 0 0;
      color: #64748b;
      font-size: 15px;
      line-height: 1.4;
    }

    .content {
      padding: 16px;
    }

    .card {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .card-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
    }

    .lang-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .lang-btn {
      border: 1px solid #cbd5e1;
      background: white;
      border-radius: 14px;
      padding: 12px 8px;
      cursor: pointer;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
    }

    .lang-btn.active {
      border-color: #2563eb;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .flag {
      display: block;
      font-size: 24px;
      margin-bottom: 6px;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-size: 14px;
      font-weight: 700;
      color: #334155;
    }

    textarea,
    input[type="file"] {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 12px;
      font-size: 15px;
      background: white;
      outline: none;
    }

    textarea:focus,
    input[type="file"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .small-textarea {
      min-height: 96px;
    }

    .hint {
      margin-top: 8px;
      font-size: 13px;
      color: #64748b;
      line-height: 1.4;
    }

    .primary-btn,
    .secondary-btn,
    .ghost-btn,
    .share-btn,
    .email-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }

    .primary-btn {
      background: #2563eb;
      color: white;
    }

    .secondary-btn {
      background: #0f766e;
      color: white;
    }

    .ghost-btn {
      background: #475569;
      color: white;
    }

    .share-btn {
      background: #16a34a;
      color: white;
    }

    .email-btn {
      background: #7c3aed;
      color: white;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 14px;
      min-height: 20px;
    }

    .result {
      margin-top: 12px;
      padding: 14px;
      border-radius: 16px;
      background: #f1f5f9;
      border: 1px solid #dbeafe;
      white-space: pre-wrap;
      line-height: 1.55;
      min-height: 120px;
      font-size: 15px;
    }

    .ocr-box {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      font-size: 13px;
      color: #475569;
      display: none;
    }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 16px 0;
      border: none;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 520px) {
      .button-row {
        grid-template-columns: 1fr;
      }

      .lang-grid {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1 class="title">Hilfe24</h1>
      <p class="subtitle" id="subtitle">Foto machen oder Text einfügen. Dann einfach erklären lassen.</p>
    </div>

    <div class="content">
      <div class="card">
        <h2 class="card-title" id="languageTitle">Sprache wählen</h2>

        <div class="lang-grid">
          <button type="button" class="lang-btn active" id="langDe" onclick="setLang('de')">
            <span class="flag">🇩🇪</span>
            Deutsch
          </button>

          <button type="button" class="lang-btn" id="langTr" onclick="setLang('tr')">
            <span class="flag">🇹🇷</span>
            Türkçe
          </button>

          <button type="button" class="lang-btn" id="langBg" onclick="setLang('bg')">
            <span class="flag">🇧🇬</span>
            Български
          </button>
        </div>
      </div>

      <div class="card">
        <h2 class="card-title" id="mainTitle">Brief verstehen</h2>

        <label for="imageInput" id="imageLabel">Foto oder mehrere Seiten hochladen</label>
        <input type="file" id="imageInput" accept="image/*" multiple>
        <div class="hint" id="imageHint">Du kannst ein oder mehrere Fotos auswählen.</div>

        <div id="ocrInfo" class="ocr-box"></div>

        <label for="input" id="textLabel">Oder Text einfügen</label>
        <textarea id="input" placeholder="Text hier einfügen..."></textarea>

        <button class="primary-btn" id="explainBtn" onclick="sendText()">Jetzt erklären</button>

        <div id="status" class="status"></div>
        <div id="output" class="result"></div>

        <div class="button-row">
          <button class="secondary-btn" id="answerBtn" onclick="writeAnswer()">Antwort schreiben</button>
          <button class="ghost-btn" id="speakBtn" onclick="speakOutput()">🔊 Vorlesen</button>
        </div>

        <div class="button-row">
          <button class="ghost-btn" id="stopBtn" onclick="stopSpeaking()">⏹ Stop</button>
          <button class="email-btn" id="emailBtn" onclick="createEmail()">📧 E-Mail</button>
        </div>

        <button class="share-btn" id="waBtn" onclick="shareWhatsApp()">🟢 WhatsApp teilen</button>
      </div>

      <div class="card">
        <h3 class="card-title" id="questionTitle">Frage zu diesem Brief</h3>
        <textarea id="questionInput" class="small-textarea" placeholder="Stelle hier deine Frage zum Brief..."></textarea>
        <button class="secondary-btn" id="questionBtn" onclick="askQuestion()">Frage stellen</button>
      </div>

      <div class="card">
        <h3 class="card-title" id="generalTitle">Allgemeine Frage</h3>
        <textarea id="generalInput" class="small-textarea" placeholder="Stelle hier deine allgemeine Frage..."></textarea>
        <div class="hint" id="generalHint">Zum Beispiel: Gibt es noch Hilfe, Unterstützung oder einen Antrag?</div>
        <button class="secondary-btn" id="generalBtn" onclick="askGeneral()">Frage senden</button>
      </div>
    </div>
  </div>

  <script>

    const outputBox = document.getElementById("output");
    const inputBox = document.getElementById("input");
    const imageInput = document.getElementById("imageInput");
    const ocrInfo = document.getElementById("ocrInfo");

    let currentLang = "de";
    let availableVoices = [];

    const translations = {

        explainBtn: "Şimdi açıkla",

        speakBtn: "🔊 Oku",
        stopBtn: "⏹ Durdur",
        emailBtn: "📧 E-Posta",
        waBtn: "🟢 WhatsApp paylaş",
        questionTitle: "Bu mektupla ilgili soru",
        questionPlaceholder: "Mektupla ilgili sorunu buraya yaz...",
        questionBtn: "Soru sor",
        generalTitle: "Genel soru",

        generalHint: "Örnek: Yardım, destek veya başvuru var mı?",
        generalBtn: "Soruyu gönder",

        statusReadingImages: "Fotoğraflar okunuyor...",

        statusQuestionDone: "Cevap hazır.",
        statusError: "Cevapta hata oldu.",
        statusReading: "Metin okunuyor...",
        statusReadDone: "Okuma bitti.",
        statusReadStop: "Okuma durduruldu.",

        inputPlaceholder: "Въведи текста тук...",
        explainBtn: "Обясни сега",

        speakBtn: "🔊 Прочети",
        stopBtn: "⏹ Стоп",
        emailBtn: "📧 Имейл",
        waBtn: "🟢 WhatsApp споделяне",
        questionTitle: "Въпрос за това писмо",
        questionPlaceholder: "Напиши въпроса си за писмото тук...",

        statusReadingImages: "Снимките се четат...",
        statusImageDone: "Снимките са прочетени успешно.",
        statusImageError: "Грешка при четене на снимките.",
        statusExplaining: "Текстът се обяснява...",
        statusExplainDone: "Обяснението е готово.",
        statusAnswering: "Отговорът се подготвя...",
        statusAnswerDone: "Отговорът е готов.",
        statusQuestionEmpty: "Моля, напиши въпрос.",
        statusQuestionLoading: "Отговорът се подготвя...",
        statusQuestionDone: "Отговорът е готов.",
        statusError: "Грешка при отговора.",
        statusReading: "Текстът се чете...",
        statusReadDone: "Четенето приключи.",
        statusReadStop: "Четенето е спряно.",
        statusReadNotSupported: "Това устройство не поддържа четене.",
        statusNoReadText: "Няма текст за четене.",
        statusNoVoice: "Няма подходящ глас за този език.",
        statusNoShareText: "Няма текст за споделяне.",

        ocrManyImages: "Избрани снимки: "

    function getT() {
      return translations[currentLang] || translations.de;
    }

    function setLang(lang) {
      currentLang = lang;

      document.getElementById("langDe").classList.remove("active");
      document.getElementById("langTr").classList.remove("active");
      document.getElementById("langBg").classList.remove("active");

      if (lang === "de") document.getElementById("langDe").classList.add("active");
      if (lang === "tr") document.getElementById("langTr").classList.add("active");
      if (lang === "bg") document.getElementById("langBg").classList.add("active");

      updateInterfaceLanguage();
    }

    function updateInterfaceLanguage() {
      const t = getT();

      document.getElementById("subtitle").innerText = t.subtitle;
      document.getElementById("languageTitle").innerText = t.languageTitle;
      document.getElementById("mainTitle").innerText = t.mainTitle;
      document.getElementById("imageLabel").innerText = t.imageLabel;
      document.getElementById("imageHint").innerText = t.imageHint;
      document.getElementById("textLabel").innerText = t.textLabel;
      document.getElementById("input").placeholder = t.inputPlaceholder;
      document.getElementById("explainBtn").innerText = t.explainBtn;
      document.getElementById("answerBtn").innerText = t.answerBtn;
      document.getElementById("speakBtn").innerText = t.speakBtn;
      document.getElementById("stopBtn").innerText = t.stopBtn;
      document.getElementById("emailBtn").innerText = t.emailBtn;
      document.getElementById("waBtn").innerText = t.waBtn;
      document.getElementById("questionTitle").innerText = t.questionTitle;
      document.getElementById("questionInput").placeholder = t.questionPlaceholder;
      document.getElementById("questionBtn").innerText = t.questionBtn;
      document.getElementById("generalTitle").innerText = t.generalTitle;
      document.getElementById("generalInput").placeholder = t.generalPlaceholder;
      document.getElementById("generalHint").innerText = t.generalHint;
      document.getElementById("generalBtn").innerText = t.generalBtn;
      updateSelectedImagesInfo();
    }

    function setStatus(text) {
      statusBox.innerText = text;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function detectUrgencyColor(text) {
      const t = text.toLowerCase();

      if (t.includes("hoch") || t.includes("yüksek") || t.includes("висока")) return "#ef4444";
      if (t.includes("mittel") || t.includes("orta") || t.includes("средна")) return "#f59e0b";
      if (t.includes("niedrig") || t.includes("düşük") || t.includes("ниска")) return "#22c55e";

      return "#64748b";
    }

    function renderOutput(text) {
      const color = detectUrgencyColor(text);

      outputBox.innerHTML = `
        <div style="padding:10px; border-radius:10px; background:${color}; color:white; font-weight:bold; margin-bottom:12px;">
          Dringlichkeit erkannt
        </div>
        <div>${escapeHtml(text).replace(/\n/g, "<br>")}</div>
      `;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = reader.result.split(",")[1];
          resolve(result);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function updateSelectedImagesInfo() {
      const t = getT();
      const files = imageInput.files;

      if (!files || files.length === 0) {
        ocrInfo.style.display = "none";
        ocrInfo.innerText = "";
        return;
      }

      ocrInfo.style.display = "block";

      if (files.length === 1) {
        ocrInfo.innerText = t.ocrOneImage;
      } else {
        ocrInfo.innerText = t.ocrManyImages + files.length;
      }
    }

    imageInput.addEventListener("change", updateSelectedImagesInfo);

    async function extractTextFromImages() {
      const files = imageInput.files;
      const t = getT();

      if (!files || files.length === 0) {
        return "";
      }

      setStatus(t.statusReadingImages);

      let allTexts = [];

      for (let i = 0; i < files.length; i++) {
        const base64 = await fileToBase64(files[i]);

        const res = await fetch("/scan", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ image: base64 })
        });

        const text = await res.text();

        if (text && text.trim()) {
          allTexts.push(text.trim());
        }
      }

      const finalText = allTexts.join("\n\n---\n\n").trim();

      if (finalText) {
        setStatus(t.statusImageDone);
      } else {
        setStatus(t.statusImageError);
      }

      return finalText;
    }

    async function sendText() {
      const t = getT();
      let text = inputBox.value.trim();

      if (!text && imageInput.files.length > 0) {
        text = await extractTextFromImages();
        inputBox.value = text;
      }

      if (!text) {
        setStatus(t.statusNoInput);
        return;
      }

      setStatus(t.statusExplaining);

      try {
        const res = await fetch("/test", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text, lang: currentLang })
        });

        const data = await res.text();
        renderOutput(data);
        setStatus(t.statusExplainDone);
      } catch (error) {
        console.log(error);
        setStatus(t.statusError);
      }
    }

    async function writeAnswer() {
      const t = getT();
      const text = inputBox.value.trim();

      if (!text) {
        setStatus(t.statusNoInput);
        return;
      }

      setStatus(t.statusAnswering);

      try {
        const res = await fetch("/antwort", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text, lang: currentLang })
        });

        const data = await res.text();
        renderOutput(data);
        setStatus(t.statusAnswerDone);
      } catch (error) {
        console.log(error);
        setStatus(t.statusError);
      }
    }

    async function askQuestion() {
      const t = getT();
      const question = document.getElementById("questionInput").value.trim();
      const text = inputBox.value.trim();

      if (!question) {
        setStatus(t.statusQuestionEmpty);
        return;
      }

      setStatus(t.statusQuestionLoading);

      try {
        const res = await fetch("/frage", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text, question, lang: currentLang })
        });

        const data = await res.text();
        renderOutput(data);
        setStatus(t.statusQuestionDone);
      } catch (error) {
        console.log(error);
        setStatus(t.statusError);
      }
    }

    async function askGeneral() {
      const t = getT();
      const question = document.getElementById("generalInput").value.trim();

      if (!question) {
        setStatus(t.statusQuestionEmpty);
        return;
      }

      setStatus(t.statusQuestionLoading);

      try {
        const res = await fetch("/general", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question, lang: currentLang })
        });

        const data = await res.text();
        renderOutput(data);
        setStatus(t.statusQuestionDone);
      } catch (error) {
        console.log(error);
        setStatus(t.statusError);
      }
    }

    function cleanTextForSpeech(text) {
      return text
        .replace(/\*\*/g, "")
        .replace(/#/g, "")
        .replace(/-/g, "")
        .replace(/\n+/g, ". ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function loadVoices() {
      availableVoices = window.speechSynthesis.getVoices();
    }

    function getLangCode(lang) {
      if (lang === "tr") return "tr-TR";
      if (lang === "bg") return "bg-BG";
      return "de-DE";
    }

    function findMatchingVoice(langCode) {
      const normalizedLangCode = langCode.toLowerCase().replace("_", "-");
      const shortLang = normalizedLangCode.split("-")[0];

      let exactVoice = availableVoices.find((voice) => {
        return voice.lang.toLowerCase().replace("_", "-") === normalizedLangCode;
      });

      if (exactVoice) return exactVoice;

      let shortVoice = availableVoices.find((voice) => {
        return voice.lang.toLowerCase().replace("_", "-").startsWith(shortLang);
      });

      if (shortVoice) return shortVoice;

      return null;
    }

    function getOutputTextOnly() {
      return outputBox.innerText.trim();
    }

    function speakOutput() {
      let text = getOutputTextOnly();
      text = cleanTextForSpeech(text);

      const t = getT();

      if (!("speechSynthesis" in window)) {
        setStatus(t.statusReadNotSupported);
        return;
      }

      if (!text) {
        setStatus(t.statusNoReadText);
        return;
      }

      loadVoices();

      const langCode = getLangCode(currentLang);
      const matchedVoice = findMatchingVoice(langCode);

      if (!matchedVoice) {
        setStatus(t.statusNoVoice);
        return;
      }

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = langCode;
      utterance.voice = matchedVoice;
      utterance.rate = 0.9;
      utterance.pitch = 1;

      utterance.onstart = function () {
        setStatus(t.statusReading);
      };

      utterance.onend = function () {
        setStatus(t.statusReadDone);
      };

      utterance.onerror = function () {
        setStatus(t.statusError);
      };

      window.speechSynthesis.speak(utterance);
    }

    function stopSpeaking() {
      const t = getT();
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
      setStatus(t.statusReadStop);
    }

    function createEmail() {
      const t = getT();
      const text = outputBox.innerText.trim();

      if (!text) {
        setStatus(t.statusNoShareText);
        return;
      }

      const subject = "Hilfe24 Anfrage";
      const body = encodeURIComponent(text);

      window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${body}`;
    }

    function shareWhatsApp() {
      const t = getT();
      const text = outputBox.innerText.trim();

      if (!text) {
        setStatus(t.statusNoShareText);
        return;
      }

      const message = encodeURIComponent(text);
      window.open(`https://wa.me/?text=${message}`, "_blank");
    }

    loadVoices();
    updateInterfaceLanguage();

    if ("speechSynthesis" in window) {
      window.speechSynthesis.addEventListener("voiceschanged", loadVoices);
    }
  </script>
</body>
</html>
