<script>
async function erklaeren() {
  const text = document.getElementById("briefText").value.trim();
  const status = document.getElementById("status");
  const ergebnis = document.getElementById("ergebnis");

  if (!text) {
    status.innerHTML = '<div class="error">Bitte füge einen Brief ein.</div>';
    ergebnis.innerHTML = "";
    return;
  }

  status.innerHTML = "<div>Lade...</div>";
  ergebnis.innerHTML = "";

  try {
    const response = await fetch("/api/brief", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text })
    });

    const data = await response.json();

    if (!response.ok) {
      status.innerHTML = `<div class="error">${data.error || "Fehler"}</div>`;
      console.log(data.details || data);
      return;
    }

    status.innerHTML = "";
    ergebnis.innerHTML = `<div class="result-box">${data.result}</div>`;
  } catch (error) {
    status.innerHTML = '<div class="error">Fehler beim Laden.</div>';
    console.error(error);
  }
}
</script>
