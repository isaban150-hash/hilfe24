<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hilfe24 - Brief erklären</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      margin: 0;
      padding: 40px 20px;
    }

    .box {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      padding: 16px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: vertical;
      box-sizing: border-box;
      margin-top: 16px;
    }

    .uploadBox {
      margin-top: 16px;
      padding: 16px;
      border: 1px dashed #bbb;
      border-radius: 10px;
      background: #fafafa;
    }

    .uploadLabel {
      display: block;
      margin-bottom: 10px;
      font-size: 16px;
      color: #333;
      font-weight: bold;
    }

    input[type="file"] {
      font-size: 16px;
    }

    button {
      margin-top: 16px;
      background: #111827;
      color: white;
      border: none;
      padding: 14px 22px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #1f2937;
    }

    #status {
      margin-top: 16px;
      font-size: 18px;
    }

    #ergebnis {
      margin-top: 20px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 18px;
      white-space: pre-wrap;
      font-size: 18px;
      line-height: 1.6;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
    }

    .loading {
      color: #374151;
    }

    .small {
      margin-top: 8px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Brief erklären</h1>
    <p>Füge hier deinen Brief ein. Hilfe24 erklärt ihn dir einfach.</p>

    <textarea id="briefText" placeholder="Füge deinen Brief hier ein..."></textarea>

    <div class="uploadBox">
      <label class="uploadLabel" for="briefBild">Oder Foto vom Brief hochladen</label>
      <input type="file" id="briefBild" accept="image/*" />
      <div class="small">Im Moment gehen Bilder. PDF bauen wir danach ein.</div>
    </div>

    <button id="erklaerBtn">📄 Brief erklären</button>

    <div id="status"></div>
    <div id="ergebnis"></div>
  </div>

  <script>
    const briefText = document.getElementById("briefText");
    const briefBild = document.getElementById("briefBild");
    const erklaerBtn = document.getElementById("erklaerBtn");
    const statusBox = document.getElementById("status");
    const ergebnisBox = document.getElementById("ergebnis");

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
          const result = reader.result;
          const base64 = result.split(",")[1];
          resolve(base64);
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    erklaerBtn.addEventListener("click", async () => {
      const text = briefText.value.trim();
      const file = briefBild.files[0];

      statusBox.className = "loading";
      statusBox.textContent = "Bitte kurz warten...";
      ergebnisBox.textContent = "";

      try {
        let response;
        let data;

        if (text) {
          response = await fetch("/api/brief", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ text })
          });
        } else if (file) {
          const imageData = await fileToBase64(file);

          response = await fetch("/api/brief-bild", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              imageData,
              mimeType: file.type
            })
          });
        } else {
          statusBox.className = "error";
          statusBox.textContent = "Bitte Text einfügen oder ein Bild hochladen.";
          return;
        }

        data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Unbekannter Fehler");
        }

        statusBox.className = "";
        statusBox.textContent = "";
        ergebnisBox.textContent = data.erklaerung;
      } catch (error) {
        statusBox.className = "error";
        statusBox.textContent = error.message || "Fehler";
      }
    });
  </script>
</body>
</html>
