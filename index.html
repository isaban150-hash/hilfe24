<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Brief erklären - Hilfe24</title>
</head>
<body>

<h1>📄 Brief erklären</h1>

<p>Füge deinen Brief ein:</p>

<textarea id="briefText" rows="10" cols="50"></textarea>
<br><br>

<button onclick="erklaeren()">➡️ Brief erklären</button>

<hr>

<div id="ergebnis"></div>

<script>
async function erklaeren() {
  const text = document.getElementById("briefText").value;

  if (!text) {
    document.getElementById("ergebnis").innerHTML =
      "Bitte füge einen Brief ein.";
    return;
  }

  document.getElementById("ergebnis").innerHTML = "Lade...";

  const response = await fetch("/api/brief", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  });

  const data = await response.json();

  document.getElementById("ergebnis").innerHTML = data.result;
}
</script>

</body>
</html>
