<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hilfe24 – Brief erklären</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .wrap {
      max-width: 760px;
      margin: 60px auto;
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 42px;
      margin: 0 0 10px 0;
    }

    p {
      font-size: 22px;
      color: #4b5563;
      margin-top: 0;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      margin-top: 20px;
      padding: 16px;
      font-size: 18px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      resize: vertical;
      box-sizing: border-box;
    }

    button {
      margin-top: 18px;
      background: #111827;
      color: white;
      border: none;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #1f2937;
    }

    #status {
      margin-top: 18px;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 14px;
      border-radius: 12px;
      font-size: 18px;
    }

    .loading {
      background: #e0f2fe;
      color: #075985;
      padding: 14px;
      border-radius: 12px;
      font-size: 18px;
    }

    .result-box {
      margin-top: 18px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px;
      font-size: 19px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📄 Brief erklären</h1>
    <p>Füge hier deinen Brief ein. Hilfe24 erklärt ihn dir einfach.</p>

    <textarea
      id="briefText"
      placeholder="Füge deinen Brief hier ein..."
    ></textarea>

    <button onclick="erklaeren()">📨 Brief erklären</button>

    <div id="status"></div>
    <div id="ergebnis"></div>
  </div>

  <script>
    async function erklaeren() {
      const text = document.getElementById("briefText").value.trim();
      const status = document.getElementById("status");
      const ergebnis = document.getElementById("ergebnis");

      if (!text) {
        status.innerHTML = '<div class="error">Bitte füge einen Brief ein.</div>';
        ergebnis.innerHTML = "";
        return;
      }

      status.innerHTML = '<div class="loading">Lade...</div>';

</body>
</html>
