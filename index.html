<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hilfe24 - Brief erklären</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      margin: 0;
      padding: 40px 20px;
    }

    .box {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      padding: 16px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: vertical;
      box-sizing: border-box;
      margin-top: 16px;
    }

    .uploadBox {
      margin-top: 16px;
      padding: 16px;
      border: 1px dashed #bbb;
      border-radius: 10px;
      background: #fafafa;
    }

    .uploadLabel {
      display: block;
      margin-bottom: 10px;
      font-size: 16px;
      color: #333;
      font-weight: bold;
    }

    input[type="file"] {
      font-size: 16px;
    }

    button {
      margin-top: 16px;
      background: #111827;
      color: white;
      border: none;
      padding: 14px 22px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #1f2937;
    }

    #status {
      margin-top: 16px;
      font-size: 18px;
    }

    #ergebnis {
      margin-top: 20px;
      background: #fcfcfc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 22px;
      white-space: normal;
      font-size: 20px;
      line-height: 1.8;
      color: #1f2937;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
    }

    .loading {
      color: #374151;
    }

    .small {
      margin-top: 8px;
      font-size: 14px;
      color: #666;
    }

    .highlight-red {
      background: #fee2e2;
      color: #991b1b;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 700;
    }

    .highlight-orange {
      background: #ffedd5;
      color: #9a3412;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 700;
    }

    .highlight-blue {
      background: #dbeafe;
      color: #1d4ed8;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 700;
    }

    .highlight-green {
      display: inline-block;
      margin-top: 10px;
      background: #dcfce7;
      color: #166534;
      padding: 10px 12px;
      border-radius: 8px;
      font-weight: 700;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Brief erklären</h1>
    <p>Füge hier deinen Brief ein oder lade Fotos hoch. Hilfe24 erklärt ihn dir einfach.</p>

    <textarea id="briefText" placeholder="Füge deinen Brief hier ein..."></textarea>

    <div class="uploadBox">
      <label class="uploadLabel" for="briefBild">Oder Foto vom Brief hochladen</label>
      <input type="file" id="briefBild" accept="image/*,.jpg,.jpeg,.png,.webp" multiple />
      <div class="small">Du kannst jetzt ein oder mehrere Bilder vom selben Brief hochladen. PDF bauen wir danach ein.</div>
    </div>

    <button id="erklaerBtn">📄 Brief erklären</button>

    <div id="status"></div>
    <div id="ergebnis"></div>
  </div>

  <script>
    const briefText = document.getElementById("briefText");
    const briefBild = document.getElementById("briefBild");
    const erklaerBtn = document.getElementById("erklaerBtn");
    const statusBox = document.getElementById("status");
    const ergebnisBox = document.getElementById("ergebnis");

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
          const result = reader.result;
          const base64 = result.split(",")[1];
          resolve(base64);
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function highlightAntwort(text) {
      if (!text) return "";

      const escapeHtml = (str) =>
        str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

      let html = escapeHtml(text);

      const highlightList = (input, items, className) => {
        const sorted = [...items].sort((a, b) => b.length - a.length);

        for (const item of sorted) {
          const escaped = item.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const regex = new RegExp(`(^|[^\\wÄÖÜäöüß])(${escaped})(?=[^\\wÄÖÜäöüß]|$)`, "gi");
          input = input.replace(regex, `$1<span class="${className}">$2</span>`);
        }

        return input;
      };

      html = html.replace(
        /\b(bis spätestens\s+\d{1,2}\.\s*[A-Za-zÄÖÜäöüß]+\s+\d{4}|bis spätestens\s+\d{1,2}\.\d{1,2}\.\d{4}|bis zum\s+\d{1,2}\.\s*[A-Za-zÄÖÜäöüß]+\s+\d{4}|bis zum\s+\d{1,2}\.\d{1,2}\.\d{4}|\d{1,2}\.\d{1,2}\.\d{4})\b/gi,
        '<span class="highlight-red">$1</span>'
      );

      html = highlightList(html, [
        "Frist",
        "Termin",
        "Mahnung",
        "Sperre",
        "Kürzung",
        "gekürzt",
        "eingestellt",
        "Einstellung",
        "gestoppt",
        "stoppen",
        "wegfallen",
        "kein Geld mehr",
        "Leistungen gekürzt",
        "Leistungen eingestellt",
        "Leistungen gestrichen",
        "Geld gestrichen",
        "dringend"
      ], "highlight-red");

      html = highlightList(html, [
        "Einstellungsbescheid",
        "Kindergeldbescheid",
        "Meldebescheinigung",
        "Lohnabrechnung",
        "Kontoauszüge",
        "Kontoauszug",
        "Mietvertrag",
        "Bescheinigung",
        "Unterlagen",
        "Unterlage",
        "Nachweise",
        "Nachweis",
        "Bescheid",
        "Abmeldung",
        "Kindergeld",
        "Vertrag",
        "Kopien",
        "Kopie",
        "Originale",
        "Original"
      ], "highlight-orange");

      html = highlightList(html, [
        "per E-Mail",
        "per Email",
        "E-Mail",
        "Email",
        "per Post",
        "Post",
        "Einwurf",
        "online",
        "hochladen",
        "Upload",
        "persönlich",
        "Portal",
        "App"
      ], "highlight-blue");

      html = html.replace(
        /(Du musst jetzt nur[\s\S]*?)(?=\n\n|$)/i,
        '<span class="highlight-green">$1</span>'
      );

      html = html.replace(/\n/g, "<br>");

      return html;
    }

    erklaerBtn.addEventListener("click", async () => {
      try {
        const text = briefText.value.trim();
        const files = briefBild.files;

        statusBox.className = "loading";
        statusBox.textContent = "Bitte kurz warten...";
        ergebnisBox.innerHTML = "";

        let response;

        if (text) {
          response = await fetch("/api/brief", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ text })
          });
        } else if (files && files.length > 0) {
          const bilder = await Promise.all(
            Array.from(files).map(async (file) => {
              const imageData = await fileToBase64(file);
              return {
                imageData,
                mimeType: file.type
              };
            })
          );

          response = await fetch("/api/brief-bild", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ bilder })
          });
        } else {
          statusBox.className = "error";
          statusBox.textContent = "Bitte Text einfügen oder mindestens ein Bild hochladen.";
          return;
        }

        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Unbekannter Fehler");
        }

        statusBox.className = "";
        statusBox.textContent = "";
        ergebnisBox.innerHTML = highlightAntwort(data.erklaerung);
      } catch (error) {
        statusBox.className = "error";
        statusBox.textContent = error.message || "Fehler";
      }
    });
  </script>
</body>
</html>
