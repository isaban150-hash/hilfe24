    .box {

      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);

    h1 {

      font-size: 42px;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      padding: 16px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: vertical;
      box-sizing: border-box;
      margin-top: 16px;
    }

    .topRow {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 16px;
    }

    .langBox {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .langBox label {
      font-size: 14px;
      font-weight: bold;
      color: #333;
    }

    select {
      padding: 10px 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: white;
    }

    .uploadBox {
      margin-top: 16px;
      padding: 16px;
      border: 1px dashed #bbb;
      border-radius: 10px;
      background: #fafafa;
    }

    .uploadLabel {
      display: block;
      margin-bottom: 10px;
      font-size: 16px;
      color: #333;
      font-weight: bold;
    }

    input[type="file"] {
      font-size: 16px;
    }

    .buttonRow {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      background: #111827;
      color: white;
      border: none;
      padding: 14px 22px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #1f2937;
    }

    .stoppBtn {
      background: #6b7280;
    }

    .stoppBtn:hover {
      background: #4b5563;
    }

    #status {
      margin-top: 16px;
      font-size: 18px;
    }

    #ergebnis {
      margin-top: 20px;
      background: #fcfcfc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 22px;
      white-space: normal;
      font-size: 20px;
      line-height: 1.8;
      color: #1f2937;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
    }

    .loading {
      color: #374151;
    }

    .small {
      margin-top: 8px;
      font-size: 14px;
      color: #666;
    }

    .highlight-red {
      background: #fee2e2;
      color: #991b1b;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 700;
    }

    .highlight-orange {
      background: #ffedd5;
      color: #9a3412;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 700;
    }

    .highlight-blue {
      background: #dbeafe;
      color: #1d4ed8;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 700;
    }

    .highlight-green {
      display: inline-block;
      margin-top: 10px;
      background: #dcfce7;
      color: #166534;
      padding: 10px 12px;
      border-radius: 8px;
      font-weight: 700;
      line-height: 1.5;
    }
  </style>
