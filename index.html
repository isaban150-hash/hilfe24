<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hilfe24 – Brief erklären</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      margin: 0;
      padding: 40px 20px;
    }

    .box {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      padding: 16px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: vertical;
      box-sizing: border-box;
      margin-top: 16px;
    }

    button {
      margin-top: 16px;
      background: #111827;
      color: white;
      border: none;
      padding: 14px 22px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #1f2937;
    }

    #status {
      margin-top: 16px;
      font-size: 18px;
    }

    #ergebnis {
      margin-top: 20px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 18px;
      white-space: pre-wrap;
      font-size: 18px;
      line-height: 1.6;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
    }

    .loading {
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>📄 Brief erklären</h1>
    <p>Füge hier deinen Brief ein. Hilfe24 erklärt ihn dir einfach.</p>

    <textarea id="briefText" placeholder="Füge deinen Brief hier ein..."></textarea>

    <button id="erklaerBtn">📨 Brief erklären</button>

    <div id="status"></div>
    <div id="ergebnis"></div>
  </div>

  <script>
    const button = document.getElementById("erklaerBtn");

    button.addEventListener("click", async function () {
      const text = document.getElementById("briefText").value.trim();
      const status = document.getElementById("status");
      const ergebnis = document.getElementById("ergebnis");

      if (!text) {
        status.innerHTML = '<div class="error">Bitte füge einen Brief ein.</div>';
        ergebnis.innerHTML = "";
        return;
      }

      status.innerHTML = '<div class="loading">Lade...</div>';
      ergebnis.innerHTML = "";

      try {
        const response = await fetch("/api/brief", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text: text })
        });

        const data = await response.json();

        if (!response.ok) {
          status.innerHTML = '<div class="error">' + (data.error || "Fehler beim Laden") + '</div>';
          return;
        }

        status.innerHTML = "";
        ergebnis.textContent = data.result || "Keine Antwort erhalten.";
      } catch (error) {
        status.innerHTML = '<div class="error">Verbindung zum Server fehlgeschlagen.</div>';
      }
    });
  </script>
</body>
</html>
