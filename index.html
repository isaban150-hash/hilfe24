<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hilfe24</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #15803d;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 8px;
      line-height: 1.5;
      font-size: 16px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 12px 0 6px;
      font-size: 16px;
    }

    select,
    textarea,
    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    .hint {
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .button-row,
    .audio-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .button-row button,
    .audio-row button {
      flex: 1 1 220px;
      min-width: 0;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: #eef2ff;
      color: var(--text);
    }

    .btn-danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .hidden {
      display: none;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .preview-grid img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
    }

    .warning {
      background: #fff7ed;
      border: 1px solid #fdba74;
      color: #9a3412;
      padding: 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 18px;
      font-weight: 600;
    }

    .short-box {
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 12px;
      padding: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      font-size: 22px;
      font-weight: 700;
    }

    .detail-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      font-size: 18px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 700;
    }

    .loader {
      margin-top: 12px;
      color: var(--primary);
      font-weight: bold;
    }

    .ok {
      color: var(--success);
      font-weight: bold;
      margin-top: 10px;
    }

    .error {
      color: var(--danger);
      font-weight: bold;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .button-row,
      .audio-row {
        flex-direction: column;
      }

      .button-row button,
      .audio-row button {
        width: 100%;
        flex: none;
      }

      h1 {
        font-size: 24px;
      }

      .short-box {
        font-size: 24px;
        line-height: 1.9;
      }

      .detail-box {
        font-size: 20px;
        line-height: 1.9;
      }

      button,
      select,
      textarea,
      input[type="file"] {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Hilfe24</h1>
      <div class="sub">
        Briefe einfach verstehen. Erst kurz und einfach. Danach mit mehr Details.
      </div>

      <label for="lang">Sprache</label>
      <select id="lang">
        <option value="de">Deutsch</option>
        <option value="tr">Türkisch</option>
        <option value="bg">Bulgarisch</option>
        <option value="ar">Arabisch</option>
      </select>

      <label for="briefText">Brief als Text</label>
      <textarea id="briefText" placeholder="Text hier einfügen, wenn du keinen Foto-Upload benutzen willst"></textarea>

      <label for="bilder">Brief-Fotos hochladen</label>
      <input id="bilder" type="file" accept="image/*" multiple />
      <div class="hint">Du kannst bis zu 6 Bilder vom selben Brief hochladen.</div>

      <div id="previewGrid" class="preview-grid"></div>

      <div class="button-row">
        <button id="analyseBtn" class="btn-primary" type="button">Brief erklären</button>
        <button id="resetBtn" class="btn-secondary" type="button">Alles zurücksetzen</button>
      </div>

      <div id="status" class="loader hidden">Bitte warten...</div>
      <div id="errorBox" class="error hidden"></div>
      <div id="okBox" class="ok hidden"></div>
    </div>

    <div id="warningCard" class="card hidden">
      <div class="section-title">Hinweis</div>
      <div id="warningText" class="warning"></div>
    </div>

    <div id="resultCard" class="card hidden">
      <div class="section-title">Kurz erklärt</div>
      <div id="kurzText" class="short-box"></div>

      <div class="audio-row">
        <button id="readShortBtn" class="btn-primary" type="button">🔊 Kurz vorlesen</button>
        <button id="readAllBtn" class="btn-secondary" type="button">🔊 Alles vorlesen</button>
        <button id="stopBtn" class="btn-danger" type="button">⏹️ Stopp</button>
      </div>
    </div>

    <div id="detailCard" class="card hidden">
      <div class="section-title">Mehr Details</div>
      <div id="detailText" class="detail-box"></div>
    </div>
  </div>

  <script>
    const langEl = document.getElementById("lang");
    const briefTextEl = document.getElementById("briefText");
    const bilderEl = document.getElementById("bilder");
    const previewGridEl = document.getElementById("previewGrid");
    const analyseBtn = document.getElementById("analyseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusEl = document.getElementById("status");
    const errorBoxEl = document.getElementById("errorBox");
    const okBoxEl = document.getElementById("okBox");

    const warningCardEl = document.getElementById("warningCard");
    const warningTextEl = document.getElementById("warningText");

    const resultCardEl = document.getElementById("resultCard");
    const detailCardEl = document.getElementById("detailCard");
    const kurzTextEl = document.getElementById("kurzText");
    const detailTextEl = document.getElementById("detailText");

    const readShortBtn = document.getElementById("readShortBtn");
    const readAllBtn = document.getElementById("readAllBtn");
    const stopBtn = document.getElementById("stopBtn");

    let currentAudioShort = "";
    let currentAudioAll = "";
    let speechQueue = [];
    let isSpeaking = false;
    let voices = [];
    let activeRequestId = 0;

    function show(el) {
      if (el) el.classList.remove("hidden");
    }

    function hide(el) {
      if (el) el.classList.add("hidden");
    }

    function setStatus(text) {
      if (!statusEl) return;
      statusEl.textContent = text;
      show(statusEl);
    }

    function clearStatus() {
      if (!statusEl) return;
      statusEl.textContent = "";
      hide(statusEl);
    }

    function setError(text) {
      if (!errorBoxEl) return;
      errorBoxEl.textContent = text;
      show(errorBoxEl);
    }

    function clearError() {
      if (!errorBoxEl) return;
      errorBoxEl.textContent = "";
      hide(errorBoxEl);
    }

    function setOk(text) {
      if (!okBoxEl) return;
      okBoxEl.textContent = text;
      show(okBoxEl);
    }

    function clearOk() {
      if (!okBoxEl) return;
      okBoxEl.textContent = "";
      hide(okBoxEl);
    }

    function clearWarning() {
      if (!warningTextEl) return;
      warningTextEl.textContent = "";
      hide(warningCardEl);
    }

    function clearResults() {
      if (kurzTextEl) kurzTextEl.textContent = "";
      if (detailTextEl) detailTextEl.textContent = "";
      currentAudioShort = "";
      currentAudioAll = "";
      hide(resultCardEl);
      hide(detailCardEl);
    }

    function stopSpeaking() {
      try {
        window.speechSynthesis.cancel();
      } catch (e) {}

      speechQueue = [];
      isSpeaking = false;
      updateSpeechButtons();
    }

    function clearOutputState() {
      clearError();
      clearOk();
      clearStatus();
      clearWarning();
      clearResults();
      stopSpeaking();
    }

    function resetAll() {
      if (briefTextEl) briefTextEl.value = "";
      if (bilderEl) bilderEl.value = "";
      if (previewGridEl) previewGridEl.innerHTML = "";
      activeRequestId++;
      clearOutputState();
    }

    function renderPreviews() {
      if (!previewGridEl || !bilderEl) return;

      previewGridEl.innerHTML = "";
      const files = Array.from(bilderEl.files || []);

      for (const file of files.slice(0, 6)) {
        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        img.onload = () => URL.revokeObjectURL(img.src);
        previewGridEl.appendChild(img);
      }
    }

    async function fileToBase64(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || "");
          const base64 = result.split(",")[1] || "";
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function speechLang(lang) {
      if (lang === "tr") return "tr-TR";
      if (lang === "bg") return "bg-BG";
      if (lang === "ar") return "ar-SA";
      return "de-DE";
    }

    function loadVoices() {
      voices = window.speechSynthesis.getVoices() || [];
    }

    loadVoices();
    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => {
        loadVoices();
      };
    }

    function pickVoice(langCode) {
      if (!voices.length) loadVoices();

      return (
        voices.find((v) => (v.lang || "").toLowerCase() === langCode.toLowerCase()) ||
        voices.find((v) =>
          (v.lang || "").toLowerCase().startsWith(langCode.split("-")[0].toLowerCase())
        ) ||
        null
      );
    }

    function cleanForSpeech(text, lang) {
      let t = String(text || "")
        .replace(/\*\*/g, " ")
        .replace(/\u00A0/g, " ")
        .replace(/[ \t]+/g, " ")
        .replace(/\n{3,}/g, "\n\n")
        .trim();

      t = t
        .replace(/Wer schreibt\?/gi, "Wer schreibt. ")
        .replace(/Worum geht es\?/gi, "Worum geht es. ")
        .replace(/Was ist jetzt wichtig\?/gi, "Was ist jetzt wichtig. ")
        .replace(/Bis wann\?/gi, "Bis wann. ")
        .replace(/Was passiert sonst\?/gi, "Was passiert sonst. ")
        .replace(/Kurz gesagt:?/gi, "Kurz gesagt. ");

      t = t
        .replace(/Kim yazıyor\?/gi, "Kim yazıyor. ")
        .replace(/Konu ne\?/gi, "Konu ne. ")
        .replace(/Şimdi ne önemli\?/gi, "Şimdi ne önemli. ")
        .replace(/Ne zamana kadar\?/gi, "Ne zamana kadar. ")
        .replace(/Yoksa ne olur\?/gi, "Yoksa ne olur. ")
        .replace(/Kısaca:?/gi, "Kısaca. ");

      t = t
        .replace(/Кой е изпратил писмото\?/gi, "Кой е изпратил писмото. ")
        .replace(/За какво става дума\?/gi, "За какво става дума. ")
        .replace(/Какво е важно сега\?/gi, "Какво е важно сега. ")
        .replace(/До кога\?/gi, "До кога. ")
        .replace(/Какво става иначе\?/gi, "Какво става иначе. ")
        .replace(/Накратко:?/gi, "Накратко. ");

      t = t
        .replace(/من أرسل الرسالة؟/g, "من أرسل الرسالة. ")
        .replace(/عن ماذا تتحدث الرسالة؟/g, "عن ماذا تتحدث الرسالة. ")
        .replace(/ما المهم الآن؟/g, "ما المهم الآن. ")
        .replace(/إلى متى؟/g, "إلى متى. ")
        .replace(/ماذا يحدث إذا لم أفعل شيئًا؟/g, "ماذا يحدث إذا لم أفعل شيئا. ")
        .replace(/باختصار:/g, "باختصار. ");

      t = t
        .replace(/€/g, " Euro ")
        .replace(/\n/g, ". ")
        .replace(/[:]/g, ". ")
        .replace(/\.\s*\./g, ".")
        .replace(/\s{2,}/g, " ")
        .trim();

      if (lang === "de") {
        t = t.replace(/\bAOK\b/g, "A O K").replace(/\bIBAN\b/g, "I B A N");
      }

      if (lang === "tr") {
        t = t.replace(/\bAOK\b/g, "A O K").replace(/\bIBAN\b/g, "iban");
      }

      return t;
    }

    function splitForSpeech(text, maxLen = 220) {
      const sentences = text.match(/[^.!?]+[.!?]?/g) || [text];
      const chunks = [];
      let current = "";

      for (const raw of sentences) {
        const s = raw.trim();
        if (!s) continue;

        if ((current + " " + s).trim().length <= maxLen) {
          current = (current + " " + s).trim();
        } else {
          if (current) chunks.push(current);
          current = s;
        }
      }

      if (current) chunks.push(current);
      return chunks;
    }

    function updateSpeechButtons() {
      if (readShortBtn) readShortBtn.disabled = isSpeaking;
      if (readAllBtn) readAllBtn.disabled = isSpeaking;
      if (stopBtn) stopBtn.disabled = !isSpeaking;
    }

    function speakChunks(chunks, lang) {
      if (!chunks.length) {
        isSpeaking = false;
        updateSpeechButtons();
        return;
      }

      const chunk = chunks.shift();
      const utterance = new SpeechSynthesisUtterance(chunk);
      const langCode = speechLang(lang);
      const voice = pickVoice(langCode);

      utterance.lang = langCode;
      if (voice) utterance.voice = voice;

      if (lang === "tr") {
        utterance.rate = 0.82;
      } else if (lang === "de") {
        utterance.rate = 0.9;
      } else {
        utterance.rate = 0.86;
      }

      utterance.pitch = 1;
      utterance.volume = 1;

      utterance.onend = () => speakChunks(chunks, lang);
      utterance.onerror = () => speakChunks(chunks, lang);

      window.speechSynthesis.speak(utterance);
    }

    function startSpeaking(text) {
      if (!langEl) return;

      const lang = langEl.value;
      const cleaned = cleanForSpeech(text, lang);

      if (!cleaned) {
        alert("Es gibt keinen Text zum Vorlesen.");
        return;
      }

      stopSpeaking();

      speechQueue = splitForSpeech(cleaned, 220);
      isSpeaking = true;
      updateSpeechButtons();
      speakChunks([...speechQueue], lang);
    }

    async function explainLetter() {
      const requestId = ++activeRequestId;

      const text = briefTextEl ? briefTextEl.value.trim() : "";
      const files = bilderEl ? Array.from(bilderEl.files || []) : [];
      const lang = langEl ? langEl.value : "de";

      clearOutputState();

      if (!text && files.length === 0) {
        setError("Bitte füge Text ein oder lade mindestens ein Bild hoch.");
        return;
      }

      if (files.length > 6) {
        setError("Du kannst maximal 6 Bilder hochladen.");
        return;
      }

      if (analyseBtn) analyseBtn.disabled = true;
      if (resetBtn) resetBtn.disabled = true;

      setStatus("Bitte warten... Der Brief wird geprüft.");

      try {
        let response;
        let data;

        if (files.length > 0) {
          const bilder = [];
          for (const file of files) {
            const imageData = await fileToBase64(file);
            bilder.push({
              mimeType: file.type || "image/jpeg",
              imageData
            });
          }

          response = await fetch("/api/brief-bild", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              lang,
              bilder
            })
          });
        } else {
          response = await fetch("/api/brief", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              lang,
              text
            })
          });
        }

        data = await response.json();

        if (requestId !== activeRequestId) return;

        clearStatus();

        if (!response.ok || !data.ok) {
          setError(data.error || "Etwas ist schiefgelaufen.");
          return;
        }

        if (data.quality_ok === false) {
          if (warningTextEl) {
            warningTextEl.textContent =
              data.hinweis || "Bitte schick ein besseres Foto vom Brief.";
          }
          show(warningCardEl);
          return;
        }

        if (kurzTextEl) kurzTextEl.textContent = data.kurz || "";
        if (detailTextEl) detailTextEl.textContent = data.details || "";

        currentAudioShort = data.audio_kurz || data.kurz || "";
        currentAudioAll = [data.audio_kurz || "", data.audio_details || ""]
          .filter(Boolean)
          .join("\n\n");

        show(resultCardEl);
        show(detailCardEl);
        setOk("Der Brief wurde erklärt.");
      } catch (err) {
        if (requestId !== activeRequestId) return;

        clearStatus();
        setError("Serverfehler. Bitte später nochmal versuchen.");
        console.error(err);
      } finally {
        if (requestId === activeRequestId) {
          if (analyseBtn) analyseBtn.disabled = false;
          if (resetBtn) resetBtn.disabled = false;
        }
      }
    }

    if (bilderEl) {
      bilderEl.addEventListener("change", () => {
        activeRequestId++;
        clearOutputState();
        renderPreviews();
      });
    }

    if (langEl) {
      langEl.addEventListener("change", () => {
        activeRequestId++;
        clearOutputState();
      });
    }

    if (briefTextEl) {
      briefTextEl.addEventListener("input", () => {
        activeRequestId++;
        clearOutputState();
      });
    }

    if (analyseBtn) {
      analyseBtn.addEventListener("click", explainLetter);
    }

    if (resetBtn) {
      resetBtn.addEventListener("click", resetAll);
    }

    if (readShortBtn) {
      readShortBtn.addEventListener("click", () => {
        startSpeaking(currentAudioShort);
      });
    }

    if (readAllBtn) {
      readAllBtn.addEventListener("click", () => {
        startSpeaking(currentAudioAll || currentAudioShort);
      });
    }

    if (stopBtn) {
      stopBtn.addEventListener("click", stopSpeaking);
    }

    updateSpeechButtons();
  </script>
</body>
</html>
