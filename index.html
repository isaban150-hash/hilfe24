<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Hilfe24</title>

  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 28px;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 10px;
      margin-top: 10px;
      font-size: 14px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    .loading {
      color: orange;
    }

    .error {
      color: red;
    }

    .result-box {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 5px;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<h1>📄 Brief erklären</h1>
<p>Füge hier deinen Brief ein. Hilfe24 erklärt ihn dir einfach.</p>

<textarea id="briefText" placeholder="Füge deinen Brief hier ein..."></textarea>

<button onclick="erklaeren()">📨 Brief erklären</button>

<div id="status"></div>
<div id="ergebnis" class="result-box"></div>

<script>
async function erklaeren() {
  const text = document.getElementById("briefText").value.trim();
  const status = document.getElementById("status");
  const ergebnis = document.getElementById("ergebnis");

  if (!text) {
    status.innerHTML = '<div class="error">Bitte füge einen Brief ein.</div>';
    ergebnis.innerHTML = "";
    return;
  }

  status.innerHTML = '<div class="loading">Lade...</div>';
  ergebnis.innerHTML = "";

  try {
    const response = await fetch("/api/brief", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text })
    });

    const data = await response.json();

    status.innerHTML = "";
    ergebnis.innerText = data.result || "Keine Antwort";

  } catch (error) {
    console.error(error);
    status.innerHTML = '<div class="error">Fehler beim Laden.</div>';
    ergebnis.innerHTML = "";
  }
}
</script>

</body>
</html>
