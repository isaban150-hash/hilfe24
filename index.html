<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hilfe24 – Brief erklären</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .container {
      max-width: 850px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    p.info {
      color: #555;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      padding: 16px;
      font-size: 20px;
      border: 1px solid #ccc;
      border-radius: 12px;
      resize: vertical;
      box-sizing: border-box;
    }

    button {
      margin-top: 16px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #1f2937;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #status {
      margin-top: 16px;
    }

    .loading,
    .error {
      padding: 14px;
      border-radius: 10px;
      margin-top: 12px;
      font-size: 18px;
    }

    .loading {
      background: #eef2ff;
      color: #3730a3;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    .result-box {
      margin-top: 22px;
      display: grid;
      gap: 14px;
    }

    .card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px;
    }

    .card h3 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    .card p {
      margin: 0;
      font-size: 18px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 16px;
    }

    .rot {
      background: #fee2e2;
      color: #991b1b;
    }

    .gelb {
      background: #fef3c7;
      color: #92400e;
    }

    .gruen {
      background: #dcfce7;
      color: #166534;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 Brief erklären</h1>
    <p class="info">Füge hier deinen Brief ein. Hilfe24 erklärt ihn dir einfach.</p>

    <textarea
      id="briefText"
      placeholder="Füge deinen Brief hier ein..."
    ></textarea>

    <br />
    <button id="erklaerButton" onclick="erklaeren()">📨 Brief erklären</button>

    <div id="status"></div>
    <div id="ergebnis" class="result-box"></div>
  </div>

  <script>
    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeDringlichkeit(value) {
      const v = String(value || "").toLowerCase().trim();

      if (v === "rot") return "rot";
      if (v === "gelb") return "gelb";
      if (v === "grün" || v === "gruen") return "gruen";

      return "gelb";
    }

    function badgeText(value) {
      if (value === "rot") return "🔴 Rot";
      if (value === "gelb") return "🟡 Gelb";
      return "🟢 Grün";
    }

    function renderAntwort(data) {
      const was = escapeHtml(data.was || "Keine Antwort");
      const bedeutung = escapeHtml(data.bedeutung || "Keine Antwort");
      const tun = escapeHtml(data.tun || "Keine Antwort");
      const dringlichkeit = normalizeDringlichkeit(data.dringlichkeit);

      return `
        <div class="card">
          <h3>📌 Was ist das?</h3>
          <p>${was}</p>
        </div>

        <div class="card">
          <h3>🧠 Was bedeutet das?</h3>
          <p>${bedeutung}</p>
        </div>

        <div class="card">
          <h3>✅ Was musst du tun?</h3>
          <p>${tun}</p>
        </div>

        <div class="card">
          <h3>🚨 Dringlichkeit</h3>
          <span class="badge ${dringlichkeit}">${badgeText(dringlichkeit)}</span>
        </div>
      `;
    }

    async function erklaeren() {
      const text = document.getElementById("briefText").value.trim();
      const status = document.getElementById("status");
      const ergebnis = document.getElementById("ergebnis");
      const button = document.getElementById("erklaerButton");

      if (!text) {
        status.innerHTML = `<div class="error">Bitte füge einen Brief ein.</div>`;
        ergebnis.innerHTML = "";
        return;
      }

      button.disabled = true;
      status.innerHTML = `<div class="loading">Lade Erklärung...</div>`;
      ergebnis.innerHTML = "";

      try {
        const response = await fetch("/api/brief", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text })
        });

        const data = await response.json();

        if (!response.ok) {
          status.innerHTML = `<div class="error">${escapeHtml(data.error || "Fehler beim Laden.")}</div>`;
          ergebnis.innerHTML = "";

          console.log("API Fehler:", data);
          return;
        }

        status.innerHTML = "";
        ergebnis.innerHTML = renderAntwort(data);

        console.log("API Antwort:", data);
      } catch (error) {
        console.error("Fetch Fehler:", error);
        status.innerHTML = `<div class="error">Verbindung zum Server fehlgeschlagen.</div>`;
        ergebnis.innerHTML = "";
      } finally {
        button.disabled = false;
      }
    }
  </script>
</body>
</html>
