<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hilfe24</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f4f7fb 0%, #eef3f9 100%);
      color: #1f2937;
      display: flex;
      justify-content: center;
      padding: 30px 14px 50px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 22px;
    }

    .top {
      margin-bottom: 18px;
    }

    .brand {
      font-size: 30px;
      font-weight: 700;
      margin: 0;
      color: #0f172a;
    }

    .subtitle {
      margin: 8px 0 0;
      color: #64748b;
      font-size: 15px;
      line-height: 1.4;
    }

    .section {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
    }

    label {
      display: block;
      margin: 8px 0 6px;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
    }

    select,
    textarea,
    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      background: white;
      outline: none;
    }

    select:focus,
    textarea:focus,
    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .small-textarea {
      min-height: 95px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      flex: 1;
      min-width: 130px;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
      color: white;
      background: #2563eb;
    }

    button:hover {
      opacity: 0.95;
    }

    button:active {
      transform: scale(0.99);
    }

    .secondary {
      background: #0f766e;
    }

    .dark {
      background: #334155;
    }

    .light-btn {
      background: #475569;
    }

    .share-btn {
      background: #16a34a;
    }

    .email-btn {
      background: #7c3aed;
    }

    .status {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 14px;
      min-height: 20px;
    }

    .result {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: #f1f5f9;
      border: 1px solid #dbeafe;
      white-space: pre-wrap;
      line-height: 1.55;
      min-height: 120px;
      font-size: 15px;
    }

    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 18px 0;
      border: none;
    }

    .hint {
      margin-top: 8px;
      color: #64748b;
      font-size: 13px;
      line-height: 1.4;
    }

    @media (max-width: 520px) {
      .container {
        padding: 16px;
      }

      .brand {
        font-size: 26px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="top">
    <h1 class="brand">Hilfe24</h1>
    <p class="subtitle" id="subtitle">Briefe einfach verstehen. Fragen stellen. Hilfe finden.</p>
  </div>

  <div class="section">
    <h2 class="section-title" id="mainSectionTitle">Brief verstehen</h2>

    <label for="language" id="languageLabel">Sprache</label>
    <select id="language">
      <option value="de">Deutsch</option>
      <option value="tr">Türkisch</option>
      <option value="bg">Bulgarisch</option>
    </select>

    <label for="imageInput" id="imageLabel">Brief als Bild hochladen</label>
    <input type="file" id="imageInput" accept="image/*">

    <label for="input" id="textLabel">Brieftext</label>
    <textarea id="input" placeholder="Text hier einfügen..."></textarea>

    <div class="buttons">
      <button id="explainBtn" onclick="sendText()">Jetzt erklären</button>
      <button id="answerBtn" class="secondary" onclick="writeAnswer()">Antwort schreiben</button>
    </div>

    <div class="buttons">
      <button id="speakBtn" class="dark" onclick="speakOutput()">🔊 Vorlesen</button>
      <button id="stopBtn" class="light-btn" onclick="stopSpeaking()">⏹ Stop</button>
    </div>

    <div id="status" class="status"></div>
    <div id="output" class="result"></div>

    <div class="buttons">
      <button id="emailBtn" class="email-btn" onclick="createEmail()">📧 E-Mail</button>
      <button id="waBtn" class="share-btn" onclick="shareWhatsApp()">🟢 WhatsApp</button>
    </div>

    <p class="hint" id="shareHint">Du kannst das Ergebnis direkt per E-Mail oder WhatsApp weiterleiten.</p>
  </div>

  <div class="section">
    <h3 class="section-title" id="questionTitle">Frage zum Brief</h3>
    <textarea id="questionInput" class="small-textarea" placeholder="Stelle hier deine Frage zum Brief..."></textarea>
    <div class="buttons">
      <button id="questionBtn" onclick="askQuestion()">Frage stellen</button>
    </div>
  </div>

  <div class="section">
    <h3 class="section-title" id="generalTitle">Allgemeine Frage</h3>
    <textarea id="generalInput" class="small-textarea" placeholder="Stelle hier deine allgemeine Frage..."></textarea>
    <div class="buttons">
      <button id="generalBtn" onclick="askGeneral()">Frage senden</button>
    </div>
    <p class="hint" id="generalHint">Zum Beispiel: Bekomme ich vielleicht noch Hilfe oder kann ich etwas beantragen?</p>
  </div>
</div>

<script>
  const statusBox = document.getElementById("status");
  const outputBox = document.getElementById("output");
  const inputBox = document.getElementById("input");
  const languageBox = document.getElementById("language");
  const imageInput = document.getElementById("imageInput");

  let availableVoices = [];

  const translations = {
    de: {
      subtitle: "Briefe einfach verstehen. Fragen stellen. Hilfe finden.",
      mainSectionTitle: "Brief verstehen",
      languageLabel: "Sprache",
      imageLabel: "Brief als Bild hochladen",
      textLabel: "Brieftext",
      inputPlaceholder: "Text hier einfügen...",
      explainBtn: "Jetzt erklären",
      answerBtn: "Antwort schreiben",
      speakBtn: "🔊 Vorlesen",
      stopBtn: "⏹ Stop",
      emailBtn: "📧 E-Mail",
      waBtn: "🟢 WhatsApp",
      shareHint: "Du kannst das Ergebnis direkt per E-Mail oder WhatsApp weiterleiten.",
      questionTitle: "Frage zum Brief",
      questionPlaceholder: "Stelle hier deine Frage zum Brief...",
      questionBtn: "Frage stellen",
      generalTitle: "Allgemeine Frage",
      generalPlaceholder: "Stelle hier deine allgemeine Frage...",
      generalBtn: "Frage senden",
      generalHint: "Zum Beispiel: Bekomme ich vielleicht noch Hilfe oder kann ich etwas beantragen?",
      statusNoText: "Bitte Text eingeben.",
      statusReadingImage: "Bild wird gelesen...",
      statusImageDone: "Text übernommen!",
      statusImageError: "Fehler beim Bildlesen.",
      statusExplaining: "Text wird erklärt...",
      statusExplainDone: "Erklärung fertig.",
      statusAnswering: "Antwort wird erstellt...",
      statusAnswerDone: "Antwort fertig.",
      statusQuestionEmpty: "Bitte Frage eingeben.",
      statusQuestionLoading: "Antwort wird erstellt...",
      statusQuestionDone: "Antwort fertig.",
      statusError: "Fehler bei Antwort.",
      statusReading: "Text wird vorgelesen...",
      statusReadDone: "Vorlesen beendet.",
      statusReadStop: "Vorlesen gestoppt.",
      statusReadNotSupported: "Vorlesen wird auf diesem Gerät nicht unterstützt.",
      statusNoReadText: "Kein Text zum Vorlesen vorhanden.",
      statusNoVoice: "Für diese Sprache ist auf diesem Gerät keine passende Stimme verfügbar.",
      statusNoShareText: "Kein Text zum Teilen vorhanden."
    },
    tr: {
      subtitle: "Mektupları kolay anla. Soru sor. Yardım bul.",
      mainSectionTitle: "Mektubu anla",
      languageLabel: "Dil",
      imageLabel: "Mektubu resim olarak yükle",
      textLabel: "Mektup metni",
      inputPlaceholder: "Metni buraya yaz...",
      explainBtn: "Şimdi açıkla",
      answerBtn: "Cevap yaz",
      speakBtn: "🔊 Oku",
      stopBtn: "⏹ Durdur",
      emailBtn: "📧 E-Posta",
      waBtn: "🟢 WhatsApp",
      shareHint: "Sonucu doğrudan e-posta veya WhatsApp ile paylaşabilirsin.",
      questionTitle: "Mektupla ilgili soru",
      questionPlaceholder: "Mektupla ilgili sorunu buraya yaz...",
      questionBtn: "Soru sor",
      generalTitle: "Genel soru",
      generalPlaceholder: "Genel sorunu buraya yaz...",
      generalBtn: "Soruyu gönder",
      generalHint: "Örnek: Acaba yardım alabilir miyim veya bir şey başvurabilir miyim?",
      statusNoText: "Lütfen metin gir.",
      statusReadingImage: "Resim okunuyor...",
      statusImageDone: "Metin alındı!",
      statusImageError: "Resim okunurken hata oldu.",
      statusExplaining: "Metin açıklanıyor...",
      statusExplainDone: "Açıklama hazır.",
      statusAnswering: "Cevap hazırlanıyor...",
      statusAnswerDone: "Cevap hazır.",
      statusQuestionEmpty: "Lütfen soru yaz.",
      statusQuestionLoading: "Cevap hazırlanıyor...",
      statusQuestionDone: "Cevap hazır.",
      statusError: "Cevapta hata oldu.",
      statusReading: "Metin okunuyor...",
      statusReadDone: "Okuma bitti.",
      statusReadStop: "Okuma durduruldu.",
      statusReadNotSupported: "Bu cihazda sesli okuma desteklenmiyor.",
      statusNoReadText: "Okunacak metin yok.",
      statusNoVoice: "Bu dil için cihazda uygun ses yok.",
      statusNoShareText: "Paylaşılacak metin yok."
    },
    bg: {
      subtitle: "Разбери писмата лесно. Задай въпрос. Намери помощ.",
      mainSectionTitle: "Разбери писмото",
      languageLabel: "Език",
      imageLabel: "Качи писмото като снимка",
      textLabel: "Текст на писмото",
      inputPlaceholder: "Въведи текста тук...",
      explainBtn: "Обясни сега",
      answerBtn: "Напиши отговор",
      speakBtn: "🔊 Прочети",
      stopBtn: "⏹ Стоп",
      emailBtn: "📧 Имейл",
      waBtn: "🟢 WhatsApp",
      shareHint: "Можеш да изпратиш резултата директно по имейл или WhatsApp.",
      questionTitle: "Въпрос за писмото",
      questionPlaceholder: "Напиши въпроса си за писмото тук...",
      questionBtn: "Задай въпрос",
      generalTitle: "Общ въпрос",
      generalPlaceholder: "Напиши общия си въпрос тук...",
      generalBtn: "Изпрати въпрос",
      generalHint: "Пример: Мога ли да получа помощ или да подам нещо?",
      statusNoText: "Моля, въведи текст.",
      statusReadingImage: "Изображението се чете...",
      statusImageDone: "Текстът е взет!",
      statusImageError: "Грешка при четене на изображението.",
      statusExplaining: "Текстът се обяснява...",
      statusExplainDone: "Обяснението е готово.",
      statusAnswering: "Отговорът се подготвя...",
      statusAnswerDone: "Отговорът е готов.",
      statusQuestionEmpty: "Моля, напиши въпрос.",
      statusQuestionLoading: "Отговорът се подготвя...",
      statusQuestionDone: "Отговорът е готов.",
      statusError: "Грешка при отговора.",
      statusReading: "Текстът се чете...",
      statusReadDone: "Четенето приключи.",
      statusReadStop: "Четенето е спряно.",
      statusReadNotSupported: "Това устройство не поддържа четене.",
      statusNoReadText: "Няма текст за четене.",
      statusNoVoice: "Няма подходящ глас за този език.",
      statusNoShareText: "Няма текст за споделяне."
    }
  };

  function getT() {
    return translations[languageBox.value] || translations.de;
  }

  function setStatus(text) {
    statusBox.innerText = text;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function detectUrgencyColor(text) {
    const t = text.toLowerCase();

    if (t.includes("hoch") || t.includes("yüksek") || t.includes("висока")) return "#ff4d4d";
    if (t.includes("mittel") || t.includes("orta") || t.includes("средна")) return "#f59e0b";
    if (t.includes("niedrig") || t.includes("düşük") || t.includes("ниска")) return "#22c55e";

    return "#64748b";
  }

  function renderOutput(text) {
    const color = detectUrgencyColor(text);

    outputBox.innerHTML = `
      <div style="padding:10px; border-radius:10px; background:${color}; color:white; font-weight:bold; margin-bottom:12px;">
        Dringlichkeit erkannt
      </div>
      <div>${escapeHtml(text).replace(/\n/g, "<br>")}</div>
    `;
  }

  function updateInterfaceLanguage() {
    const t = getT();

    document.getElementById("subtitle").innerText = t.subtitle;
    document.getElementById("mainSectionTitle").innerText = t.mainSectionTitle;
    document.getElementById("languageLabel").innerText = t.languageLabel;
    document.getElementById("imageLabel").innerText = t.imageLabel;
    document.getElementById("textLabel").innerText = t.textLabel;
    document.getElementById("input").placeholder = t.inputPlaceholder;
    document.getElementById("explainBtn").innerText = t.explainBtn;
    document.getElementById("answerBtn").innerText = t.answerBtn;
    document.getElementById("speakBtn").innerText = t.speakBtn;
    document.getElementById("stopBtn").innerText = t.stopBtn;
    document.getElementById("emailBtn").innerText = t.emailBtn;
    document.getElementById("waBtn").innerText = t.waBtn;
    document.getElementById("shareHint").innerText = t.shareHint;
    document.getElementById("questionTitle").innerText = t.questionTitle;
    document.getElementById("questionInput").placeholder = t.questionPlaceholder;
    document.getElementById("questionBtn").innerText = t.questionBtn;
    document.getElementById("generalTitle").innerText = t.generalTitle;
    document.getElementById("generalInput").placeholder = t.generalPlaceholder;
    document.getElementById("generalBtn").innerText = t.generalBtn;
    document.getElementById("generalHint").innerText = t.generalHint;
  }

  imageInput.addEventListener("change", async function () {
    const file = this.files[0];
    if (!file) return;

    const t = getT();
    setStatus(t.statusReadingImage);

    const reader = new FileReader();

    reader.onload = async function () {
      try {
        const base64 = reader.result.split(",")[1];

        const res = await fetch("/scan", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ image: base64 })
        });

        const text = await res.text();
        inputBox.value = text;
        setStatus(t.statusImageDone);
      } catch (error) {
        console.log(error);
        setStatus(t.statusImageError);
      }
    };

    reader.readAsDataURL(file);
  });

  async function sendText() {
    const text = inputBox.value.trim();
    const lang = languageBox.value;
    const t = getT();

    if (!text) {
      setStatus(t.statusNoText);
      return;
    }

    setStatus(t.statusExplaining);

    try {
      const res = await fetch("/test", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text, lang })
      });

      const data = await res.text();
      renderOutput(data);
      setStatus(t.statusExplainDone);
    } catch (error) {
      console.log(error);
      setStatus(t.statusError);
    }
  }

  async function writeAnswer() {
    const text = inputBox.value.trim();
    const lang = languageBox.value;
    const t = getT();

    if (!text) {
      setStatus(t.statusNoText);
      return;
    }

    setStatus(t.statusAnswering);

    try {
      const res = await fetch("/antwort", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text, lang })
      });

      const data = await res.text();
      renderOutput(data);
      setStatus(t.statusAnswerDone);
    } catch (error) {
      console.log(error);
      setStatus(t.statusError);
    }
  }

  async function askQuestion() {
    const question = document.getElementById("questionInput").value.trim();
    const text = inputBox.value.trim();
    const lang = languageBox.value;
    const t = getT();

    if (!question) {
      setStatus(t.statusQuestionEmpty);
      return;
    }

    setStatus(t.statusQuestionLoading);

    try {
      const res = await fetch("/frage", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text, question, lang })
      });

      const data = await res.text();
      renderOutput(data);
      setStatus(t.statusQuestionDone);
    } catch (error) {
      console.log(error);
      setStatus(t.statusError);
    }
  }

  async function askGeneral() {
    const question = document.getElementById("generalInput").value.trim();
    const lang = languageBox.value;
    const t = getT();

    if (!question) {
      setStatus(t.statusQuestionEmpty);
      return;
    }

    setStatus(t.statusQuestionLoading);

    try {
      const res = await fetch("/general", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ question, lang })
      });

      const data = await res.text();
      renderOutput(data);
      setStatus(t.statusQuestionDone);
    } catch (error) {
      console.log(error);
      setStatus(t.statusError);
    }
  }

  function cleanTextForSpeech(text) {
    return text
      .replace(/\*\*/g, "")
      .replace(/#/g, "")
      .replace(/-/g, "")
      .replace(/\n+/g, ". ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function loadVoices() {
    availableVoices = window.speechSynthesis.getVoices();
  }

  function getLangCode(lang) {
    if (lang === "tr") return "tr-TR";
    if (lang === "bg") return "bg-BG";
    return "de-DE";
  }

  function findMatchingVoice(langCode) {
    const normalizedLangCode = langCode.toLowerCase().replace("_", "-");
    const shortLang = normalizedLangCode.split("-")[0];

    let exactVoice = availableVoices.find((voice) => {
      return voice.lang.toLowerCase().replace("_", "-") === normalizedLangCode;
    });

    if (exactVoice) return exactVoice;

    let shortVoice = availableVoices.find((voice) => {
      return voice.lang.toLowerCase().replace("_", "-").startsWith(shortLang);
    });

    if (shortVoice) return shortVoice;

    return null;
  }

  function getOutputTextOnly() {
    return outputBox.innerText.trim();
  }

  function speakOutput() {
    let text = getOutputTextOnly();
    text = cleanTextForSpeech(text);

    const lang = languageBox.value;
    const t = getT();

    if (!("speechSynthesis" in window)) {
      setStatus(t.statusReadNotSupported);
      return;
    }

    if (!text) {
      setStatus(t.statusNoReadText);
      return;
    }

    loadVoices();

    const langCode = getLangCode(lang);
    const matchedVoice = findMatchingVoice(langCode);

    if (!matchedVoice) {
      setStatus(t.statusNoVoice);
      return;
    }

    window.speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = langCode;
    utterance.voice = matchedVoice;
    utterance.rate = 0.9;
    utterance.pitch = 1;

    utterance.onstart = function () {
      setStatus(t.statusReading);
    };

    utterance.onend = function () {
      setStatus(t.statusReadDone);
    };

    utterance.onerror = function () {
      setStatus(t.statusError);
    };

    window.speechSynthesis.speak(utterance);
  }

  function stopSpeaking() {
    const t = getT();
    if ("speechSynthesis" in window) {
      window.speechSynthesis.cancel();
    }
    setStatus(t.statusReadStop);
  }

  function createEmail() {
    const t = getT();
    const text = outputBox.innerText.trim();

    if (!text) {
      setStatus(t.statusNoShareText);
      return;
    }

    const subject = "Hilfe24 Anfrage";
    const body = encodeURIComponent(text);

    window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${body}`;
  }

  function shareWhatsApp() {
    const t = getT();
    const text = outputBox.innerText.trim();

    if (!text) {
      setStatus(t.statusNoShareText);
      return;
    }

    const message = encodeURIComponent(text);
    window.open(`https://wa.me/?text=${message}`, "_blank");
  }

  languageBox.addEventListener("change", updateInterfaceLanguage);

  loadVoices();
  updateInterfaceLanguage();

  if ("speechSynthesis" in window) {
    window.speechSynthesis.addEventListener("voiceschanged", loadVoices);
  }
</script>

</body>
</html>
